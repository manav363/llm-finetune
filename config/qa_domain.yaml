# Domain Q&A fine-tuning config.
# The `backend` field is the single switch that decides where training runs:
#   mock -> no training, writes a marker adapter (offline dry-run / CI)
#   cuda -> QLoRA via transformers+peft+bitsandbytes  (needs an NVIDIA GPU)
#   mlx  -> LoRA via mlx-lm                            (needs Apple Silicon)
seed: 42
backend: mock

model:
  name: Qwen/Qwen2.5-3B-Instruct
  max_seq_len: 1024

data:
  raw_path: data/sample/domain_qa.jsonl
  processed_path: data/processed/domain_qa.jsonl
  splits_dir: data/processed/splits
  val_frac: 0.15
  test_frac: 0.15
  # Lexical near-duplicate threshold (Jaccard over question+answer tokens).
  # A record is dropped when it is >= this similar to an already-kept record.
  # NOTE: lexical only — semantic paraphrases with low token overlap survive and
  # can cross train/test. A real corpus should add semantic/near-dup controls.
  near_dup_threshold: 0.85
  # Split within each category so the category mix is preserved across
  # train/val/test (narrows category-imbalance leakage). Needs enough items per
  # category; off by default for the tiny sample.
  stratify_splits: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]

train:
  epochs: 3
  batch_size: 4
  grad_accum: 4
  learning_rate: 0.0002
  output_dir: outputs/adapter
  # max_steps: 0 runs full epochs. Set a small value (e.g. 2) for a smoke train
  # that proves the loop end-to-end without waiting for a full run.
  max_steps: 0

wandb:
  enabled: false
  project: llm-finetune

# M4 optimize/export. Merge the winning LoRA into the base weights, quantize to
# a single GGUF artifact, and sanity-check that quantization doesn't collapse
# quality versus the merged fp16 model (a re-run of the M3 eval on a test slice).
quantize:
  merged_dir: outputs/merged      # merged fp16 weights (LoRA fused into base)
  gguf_path: outputs/model.gguf   # the single quantized artifact
  quant: Q4_K_M                   # llama.cpp quant level (recorded in export.json)
  # Max headline-quality drop the quantized model may show vs merged fp16.
  # Exceeding it fails the sanity check.
  tolerance: 0.05
  # Local llama.cpp checkout for the CUDA/HF GGUF conversion step. null -> look
  # on PATH. Unused by the mlx exporter (mlx-lm exports GGUF itself) and mock.
  llama_cpp_dir: null
